<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Nombre Empresa</title>
  <!-- Conexión con CSS -->
  <link rel="stylesheet" href="../CSS/contacto.css">
</head>
<body>

  <!-- HEADER -->
  <header class="Header">
        <div class="Logo-container">
            <img src="../Imagenes/Imagenes/icon-level-up.png" alt="Logo de la empresa" class="Logo">
            <h1 class="Nombre-empresa">LEVEL-UP GAMER</h1>
        </div>
        <nav class="nav">
            <a href="index.html">Inicio</a>
            <a href="#">Productos</a>
            <a href="#">Nosotros</a>
            <a href="#">Blogs</a>
        </nav>
        <div class="Carrito">
            <button class="button-carrito">
                <img src="../Imagenes/Imagenes/carrito-icon.png" alt="Icono del carrito" class="icono-carrito">
            </button>
        </div>
    </header>

  <!-- LOGO EMPRESA -->
  <div class="empresa">
    <div class="empresa-logo"><img src="../Imagenes/Imagenes/icon-level-up.png" alt="Logo de la empresa" class="Logo">
</div>
    <h2>LEVEL-UP GAMER</h2>
  </div>

  <!-- FORMULARIO -->
  <div class="formulario">
    <h3>FORMULARIO DE CONTACTOS</h3>
    <form>
      <label for="nombre">NOMBRE COMPLETO</label>
      <input type="text" id="nombre" name="nombre">

      <label for="correo">CORREO</label>
      <input type="email" id="correo" name="correo">

      <label for="contenido">CONTENIDO</label>
      <textarea id="contenido" name="contenido"></textarea>

      <button type="submit">ENVIAR MENSAJE</button>
    </form>
  </div>

</body>
</html>
