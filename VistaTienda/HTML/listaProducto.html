<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Nombre Empresa</title>
  <!-- Conexión con CSS -->
  <link rel="stylesheet" href="../CSS/listaProducto.css">
</head>
<body>

  <!-- HEADER -->
  <header class="Header">
        <div class="Logo-container">
            <img src="../Imagenes/Imagenes/icon-level-up.png" alt="Logo de la empresa" class="Logo">
            <h1 class="Nombre-empresa">LEVEL-UP GAMER</h1>
        </div>
        <nav class="nav">
            <a href="index.html">Inicio</a>
            <a href="#">Nosotros</a>
            <a href="#">Blogs</a>
            <a href="#">Contactos</a>
        </nav>
        <div class="Carrito">
            <button class="button-carrito">
                <img src="../Imagenes/Imagenes/carrito-icon.png" alt="Icono del carrito" class="icono-carrito">
            </button>
        </div>
    </header>

  <!-- SECCIÓN PRODUCTOS -->
  <main>
    <h2>PRODUCTOS</h2>
    <div class="productos-grid">
      
      <!-- Tarjeta Producto -->
      <div class="producto">
        <img src="../Imagenes/Imagenes/audifonos.jpeg" alt="audifonos GAMER" class="audifonos">
        <p class="titulo">Audifonos GAMER</p>
        <p class="precio">$64.990</p>
        <button>Añadir</button>
      </div>

      <div class="producto">
        <img src="../Imagenes/Imagenes/descarga.jpeg" alt="silla GAMER" class="silla">
        <p class="titulo">Silla GAMER</p>
        <p class="precio">$72.990</p>
        <button>Añadir</button>
      </div>

      <div class="producto">
        <img src="../Imagenes/Imagenes/Escritorio.webp" alt="escritorio GAMER" class="escritorio">
        <p class="titulo">Escritorio GAMER</p>
        <p class="precio">$70.990</p>
        <button>Añadir</button>
      </div>

      <div class="producto">
        <img src="../Imagenes/Imagenes/Mando.webp" alt="mando GAMER" class="mandoxbox">
        <p class="titulo">Mando de xbox GAMER</p>
        <p class="precio">$79.990</p>
        <button>Añadir</button>
      </div>

      <div class="producto">
        <img src="../Imagenes/Imagenes/Mause.webp" alt="mouse GAMER" class="mouse">
        <p class="titulo">Mouse GAMER</p>
        <p class="precio">$28.990</p>
        <button>Añadir</button>
      </div>

      <div class="producto">
        <img src="../Imagenes/Imagenes/mausepad.avif" alt="mousepad GAMER" class="mousepad">
        <p class="titulo">Mouse-pad GAMER</p>
        <p class="precio">$6.990</p>
        <button>Añadir</button>
      </div>

      <div class="producto">
        <img src="../Imagenes/Imagenes/monitor.jpeg" alt="monitor GAMER" class="monitor">
        <p class="titulo">Monitor GAMER</p>
        <p class="precio">$134.990</p>
        <button>Añadir</button>
      </div>

      <div class="producto">
        <img src="../Imagenes/Imagenes/Teclado.webp" alt="teclado GAMER" class="teclado">
        <p class="titulo">Teclado GAMER</p>
        <p class="precio">$15.990</p>
        <button>Añadir</button>
      </div>
    </div>
  </main>

</body>
</html>
